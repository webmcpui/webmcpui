name: Release

# Publishes to npm (OIDC trusted publishing, with provenance):
#   @webmcpui/tokens, @webmcpui/webmcp, @webmcpui/components,
#   @webmcpui/react, @webmcpui/vue
# Publishes to JSR (tokenless OIDC):
#   @webmcpui/webmcp — zero external deps, fully JSR-compatible.
# No long-lived tokens are stored anywhere.
#
# Trigger: publish a GitHub Release (bump versions, tag e.g. v0.4.0, publish
# the release). workflow_dispatch is provided for manual re-runs.
#
# One-time prerequisites in each registry's UI:
#   npm  — add a Trusted Publisher for each @webmcpui/* package:
#          GitHub Actions · repo webmcpui/webmcpui · workflow "release.yml".
#          Set each package's access to "Require 2FA, disallow tokens".
#   JSR  — link @webmcpui/webmcp to the webmcpui/webmcpui repo
#          (jsr.io/@webmcpui/webmcp · Settings · GitHub repository).

on:
  release:
    types: [published]
  workflow_dispatch:

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  test:
    # Never let a fork run this.
    if: github.repository == 'webmcpui/webmcpui'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm turbo run build --filter='!@webmcpui/web'

      - name: Typecheck
        working-directory: packages/components
        run: pnpm typecheck

      - name: Smoke test
        working-directory: packages/components
        run: pnpm test:smoke

      - name: Install Playwright browsers
        working-directory: packages/components
        run: pnpm exec playwright install --with-deps chromium

      - name: Test
        working-directory: packages/components
        run: pnpm test

  release:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # OIDC — required for npm trusted publishing AND JSR
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          cache: pnpm

      # OIDC trusted publishing needs npm >= 11.5.1; pin to latest to be safe.
      - name: Upgrade npm
        run: |
          npm install -g npm@latest
          npm --version

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm turbo run build --filter='!@webmcpui/web'

      # Publish in dependency order so each package is on npm before its
      # dependents are published. pnpm publish rewrites workspace:* → real
      # version in the tarball automatically.

      - name: Publish @webmcpui/tokens to npm
        working-directory: packages/tokens
        run: |
          VER=$(node -p "require('./package.json').version")
          if npm view "@webmcpui/tokens@$VER" version >/dev/null 2>&1; then
            echo "@webmcpui/tokens@$VER already on npm — skipping."
          else
            pnpm publish --access public --no-git-checks
          fi

      - name: Publish @webmcpui/webmcp to npm
        working-directory: packages/webmcp
        run: |
          VER=$(node -p "require('./package.json').version")
          if npm view "@webmcpui/webmcp@$VER" version >/dev/null 2>&1; then
            echo "@webmcpui/webmcp@$VER already on npm — skipping."
          else
            pnpm publish --access public --no-git-checks
          fi

      - name: Publish @webmcpui/components to npm
        working-directory: packages/components
        run: |
          VER=$(node -p "require('./package.json').version")
          if npm view "@webmcpui/components@$VER" version >/dev/null 2>&1; then
            echo "@webmcpui/components@$VER already on npm — skipping."
          else
            pnpm publish --access public --no-git-checks
          fi

      - name: Publish @webmcpui/react to npm
        working-directory: packages/react
        run: |
          VER=$(node -p "require('./package.json').version")
          if npm view "@webmcpui/react@$VER" version >/dev/null 2>&1; then
            echo "@webmcpui/react@$VER already on npm — skipping."
          else
            pnpm publish --access public --no-git-checks
          fi

      - name: Publish @webmcpui/vue to npm
        working-directory: packages/vue
        run: |
          VER=$(node -p "require('./package.json').version")
          if npm view "@webmcpui/vue@$VER" version >/dev/null 2>&1; then
            echo "@webmcpui/vue@$VER already on npm — skipping."
          else
            pnpm publish --access public --no-git-checks
          fi

      # --- JSR (tokenless OIDC) ---

      - name: Publish @webmcpui/webmcp to JSR
        working-directory: packages/webmcp
        run: |
          VER=$(node -p "require('./package.json').version")
          if curl -sfo /dev/null "https://jsr.io/@webmcpui/webmcp/${VER}_meta.json"; then
            echo "@webmcpui/webmcp@$VER already on JSR — skipping."
          else
            npx jsr publish
          fi
